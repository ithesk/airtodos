<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Calidad del Aire</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aire">
<link rel="apple-touch-icon" href="/icon-180.png">
<style>
  :root {
    --page:#0a0a0c; --ink:#ffffff; --ink-2:#b9b9c3; --ink-mute:#6f6f7a;
    --card-ink:#141417; --card-ink-2:rgba(20,20,23,.62);
    --track:#1e1e24;
    --amarillo:#f2cf63; --lila:#c9aef2; --verde:#5fc79b; --azul:#6faaf5;
    --naranja:#f0955c; --rojo:#ef6a6a;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--page); color:var(--ink); min-height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    padding:calc(10px + env(safe-area-inset-top)) 16px calc(12px + env(safe-area-inset-bottom));
  }
  .wrap { width:100%; max-width:430px; display:flex; flex-direction:column; flex:1; }

  header { display:flex; align-items:center; justify-content:space-between; padding:2px 2px 0; }
  .logo { display:grid; grid-template-columns:6px 6px; gap:4px; }
  .logo i { width:6px; height:6px; border-radius:50%; background:var(--ink-2); }
  .logo i:nth-child(1) { background:var(--ink); }
  .hname { font-size:14px; color:var(--ink-2); }
  .hname b { color:var(--ink); font-weight:700; }
  .havatar {
    width:30px; height:30px; border-radius:50%; background:#1c1c22;
    display:flex; align-items:center; justify-content:center; font-size:14px;
    border:1px solid rgba(255,255,255,.08);
  }

  h1 { text-align:center; font-size:19px; font-weight:300; margin-top:12px; letter-spacing:.2px; }

  .gauge { position:relative; margin:2px auto 0; width:min(235px,64vw); }
  .gauge svg { width:100%; height:auto; display:block; }
  .g-progress { transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1); }
  .g-knob { transition:cx .9s cubic-bezier(.4,0,.2,1), cy .9s cubic-bezier(.4,0,.2,1); }
  .g-center {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding-top:10px;
  }
  .estado { font-size:32px; font-weight:800; letter-spacing:-1px; color:var(--verde); transition:color .6s ease; }
  .lectura { margin-top:6px; font-size:15px; font-weight:700; }
  .lectura .u { font-size:11px; font-weight:600; color:var(--ink-mute); margin-left:3px; }
  .sub { text-align:center; font-size:13px; color:var(--ink-2); margin-top:0; min-height:18px; }

  .rows { display:flex; flex-direction:column; gap:9px; margin-top:12px; }
  .row { border-radius:20px; padding:12px 18px 9px; color:var(--card-ink); }
  .row.amarillo { background:var(--amarillo); }
  .row.lila     { background:var(--lila); }
  .row.verde    { background:var(--verde); }
  .row.azul     { background:var(--azul); }
  .r-top { display:flex; align-items:center; justify-content:space-between; }
  .r-label { font-size:15px; font-weight:800; letter-spacing:.2px; }
  .r-sub { font-size:12px; font-weight:500; color:var(--card-ink-2); margin-top:2px; }
  .r-val { font-size:27px; font-weight:800; letter-spacing:-1px; white-space:nowrap; }
  .r-val .u { font-size:13px; font-weight:700; opacity:.55; margin-left:2px; letter-spacing:0; }
  .r-scale {
    position:relative; margin:9px 1px 14px; height:7px; border-radius:4px;
    background:rgba(20,20,23,.14);
  }
  .r-zone {
    position:absolute; top:0; height:100%; border-radius:4px;
    background:rgba(20,20,23,.30);
  }
  .r-zone span {
    position:absolute; top:11px; left:50%; transform:translateX(-50%);
    font-size:9px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
    color:var(--card-ink-2); white-space:nowrap;
  }
  .r-dot {
    position:absolute; top:50%; left:2%; width:14px; height:14px; border-radius:50%;
    background:var(--card-ink); border:2.5px solid rgba(255,255,255,.9);
    transform:translate(-50%,-50%); box-shadow:0 1px 4px rgba(0,0,0,.25);
    transition:left .9s cubic-bezier(.4,0,.2,1);
  }

  .foot { text-align:center; margin-top:auto; padding-top:10px; font-size:12px; color:var(--ink-mute); }

  @media (max-height:720px) {
    h1 { font-size:17px; margin-top:8px; }
    .gauge { width:min(195px,56vw); }
    .estado { font-size:26px; }
    .lectura { margin-top:4px; font-size:13px; }
    .r-sub { display:none; }
    .r-val { font-size:23px; }
    .row { padding:10px 18px 7px; }
    .r-scale { margin:7px 1px 13px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><i></i><i></i><i></i><i></i></div>
    <div class="hname">Calidad del <b>Aire</b> 🍃</div>
    <div class="havatar">🏠</div>
  </header>

  <h1>Estado del aire en este momento</h1>

  <div class="gauge">
    <svg viewBox="0 0 300 240" aria-hidden="true">
      <defs>
        <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#f2cf63"/>
          <stop offset="35%" stop-color="#5fc79b"/>
          <stop offset="70%" stop-color="#6faaf5"/>
          <stop offset="100%" stop-color="#c9aef2"/>
        </linearGradient>
      </defs>
      <path d="M 75.75 204.25 A 105 105 0 1 1 224.25 204.25"
            fill="none" stroke="var(--track)" stroke-width="10" stroke-linecap="round"/>
      <path id="gprog" class="g-progress" d="M 75.75 204.25 A 105 105 0 1 1 224.25 204.25"
            fill="none" stroke="url(#arcGrad)" stroke-width="10" stroke-linecap="round"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"/>
      <circle id="gknob" class="g-knob" cx="75.75" cy="204.25" r="9" fill="#fff" stroke="var(--page)" stroke-width="4"/>
    </svg>
    <div class="g-center">
      <div class="estado" id="estado">Cargando…</div>
      <div class="lectura"><span id="co2">–</span><span class="u">ppm CO₂</span></div>
    </div>
  </div>
  <div class="sub" id="sub">Conectando con el sensor</div>

  <div class="rows">
    <div class="row amarillo">
      <div class="r-top">
        <div><div class="r-label">CO₂</div><div class="r-sub">Dióxido de carbono</div></div>
        <div class="r-val"><span id="co2b">–</span><span class="u">ppm</span></div>
      </div>
      <div class="r-scale"><div class="r-zone" style="left:0%;width:33.3%"><span>óptimo</span></div><div class="r-dot" id="dot-co2"></div></div>
    </div>
    <div class="row lila">
      <div class="r-top">
        <div><div class="r-label">VOC</div><div class="r-sub">Compuestos volátiles</div></div>
        <div class="r-val"><span id="voc">–</span></div>
      </div>
      <div class="r-scale"><div class="r-zone" style="left:0%;width:30%"><span>óptimo</span></div><div class="r-dot" id="dot-voc"></div></div>
    </div>
    <div class="row verde">
      <div class="r-top">
        <div><div class="r-label">Temperatura</div><div class="r-sub">Ambiente interior</div></div>
        <div class="r-val"><span id="temp">–</span><span class="u">°C</span></div>
      </div>
      <div class="r-scale"><div class="r-zone" style="left:33.3%;width:23.4%"><span>óptimo</span></div><div class="r-dot" id="dot-temp"></div></div>
    </div>
    <div class="row azul">
      <div class="r-top">
        <div><div class="r-label">Humedad</div><div class="r-sub">Relativa del aire</div></div>
        <div class="r-val"><span id="hum">–</span><span class="u">%</span></div>
      </div>
      <div class="r-scale"><div class="r-zone" style="left:30%;width:35%"><span>óptimo</span></div><div class="r-dot" id="dot-hum"></div></div>
    </div>
  </div>

  <div class="foot" id="foot">—</div>
</div>

<script>
const NIVELES = {
  0:{txt:"Bueno",    color:"var(--verde)",    sub:"El aire está limpio y bien ventilado"},
  1:{txt:"Moderado", color:"var(--amarillo)", sub:"Aceptable, conviene ventilar pronto"},
  2:{txt:"Malo",     color:"var(--naranja)",  sub:"Ventila el ambiente ahora"},
  3:{txt:"Crítico",  color:"var(--rojo)",     sub:"Aire viciado — abre puertas y ventanas"},
};
const fmt = (v,d=0) => (v==null||isNaN(v)) ? "–" : Number(v).toFixed(d);

// Rango de cada escala: [min, max] → 0..100%
const RANGOS = {
  co2:  [400, 1600],  // ppm: aire exterior → crítico
  voc:  [0, 500],     // índice VOC de Sensirion
  temp: [10, 40],     // °C
  hum:  [0, 100],     // %
};
function setDot(id, v, key){
  const [min,max] = RANGOS[key];
  const p = (v==null||isNaN(v)) ? 2 : Math.min(98, Math.max(2, (v-min)/(max-min)*100));
  document.getElementById(id).style.left = p + "%";
}

// Geometría del arco: 270°, empieza en 135° (abajo-izquierda), cx 150 cy 130 r 105
function setGauge(p){ // p en 0..1
  document.getElementById("gprog").style.strokeDashoffset = 100 - p*100;
  const th = (135 + 270*p) * Math.PI/180;
  const k = document.getElementById("gknob");
  k.setAttribute("cx", (150 + 105*Math.cos(th)).toFixed(2));
  k.setAttribute("cy", (130 + 105*Math.sin(th)).toFixed(2));
}

// Qué sensor mostrar: lo dice la etiqueta NFC en la URL (?s=abc123).
// Sin parámetro se muestra el sensor por defecto — así la etiqueta original
// sigue funcionando tal cual fue grabada.
const SENSOR = (new URLSearchParams(location.search).get("s") || "").trim();
const Q = SENSOR ? "?s=" + encodeURIComponent(SENSOR) : "";

async function tick(){
  try{
    const d = await (await fetch("/api/data"+Q,{cache:"no-store"})).json();
    if(d==null || d.co2==null) return noData();
    const n = NIVELES[d.nivel] ?? NIVELES[0];
    const est = document.getElementById("estado");
    est.textContent = n.txt;
    est.style.color = n.color;
    document.getElementById("sub").textContent = n.sub;
    document.getElementById("co2").textContent  = fmt(d.co2);
    document.getElementById("co2b").textContent = fmt(d.co2);
    document.getElementById("voc").textContent  = fmt(d.voc);
    document.getElementById("temp").textContent = fmt(d.temp,1);
    document.getElementById("hum").textContent  = fmt(d.hum,1);
    setDot("dot-co2",  d.co2,  "co2");
    setDot("dot-voc",  d.voc,  "voc");
    setDot("dot-temp", d.temp, "temp");
    setDot("dot-hum",  d.hum,  "hum");
    // El arco refleja el CO2: 400 ppm (aire exterior) → 1600 ppm (crítico)
    setGauge(Math.min(1, Math.max(0.04, (d.co2-400)/1200)));
    const s = Math.round((Date.now()-d.ts)/1000);
    document.getElementById("foot").textContent =
      "Actualizado hace " + (s<60 ? s+" s" : Math.round(s/60)+" min");
  }catch(e){ noData(); }
}
function noData(){
  const est = document.getElementById("estado");
  est.textContent = "Sin datos";
  est.style.color = "var(--ink-mute)";
  document.getElementById("sub").textContent = "El sensor no ha reportado aún";
  document.getElementById("foot").textContent = "Reintentando…";
  setGauge(0);
  ["dot-co2","dot-voc","dot-temp","dot-hum"].forEach(id =>
    document.getElementById(id).style.left = "2%");
}
tick(); setInterval(tick, 5000);
</script>
</body>
</html>
